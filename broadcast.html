<!DOCTYPE html>
<html lang="ko" class="page-scroll">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MGA — 방송 맛집 수집</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/tokens.css"/>
  <style>
    body{background:var(--bg0);color:var(--t1);min-height:100vh;font-family:var(--font-body);}
    .top-bar{position:sticky;top:0;z-index:100;background:var(--bg1);border-bottom:0.5px solid var(--bg5);
      padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .logo{font-family:var(--font-display);font-size:18px;}
    .logo span{color:var(--gold);}
    .container{max-width:760px;margin:0 auto;padding:20px 16px 80px;}
    .card{background:var(--bg2);border:0.5px solid var(--bg5);border-radius:var(--r-md);padding:16px;margin-bottom:14px;}
    .card-title{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:12px;letter-spacing:.04em;}
    .btn{padding:9px 18px;border-radius:var(--r-md);font-size:13px;font-weight:500;
      font-family:var(--font-body);cursor:pointer;border:0.5px solid var(--bg5);}
    .btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);}
    .btn-gold:disabled{opacity:.5;cursor:not-allowed;}
    .btn-ghost{background:var(--bg3);color:var(--t2);}
    .btn-sm{padding:5px 12px;font-size:12px;border-radius:var(--r-sm);}
    .input-field{width:100%;padding:9px 12px;background:var(--bg1);border:0.5px solid var(--bg5);
      border-radius:var(--r-sm);font-size:13px;color:var(--t1);font-family:var(--font-body);outline:none;}
    .input-field:focus{border-color:var(--gold);}
    .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;}
    .badge-new{background:#c8f0e0;color:#1a5c3a;border:0.5px solid #5aad80;}
    .badge-dup{background:#fef3c7;color:#633806;border:0.5px solid #fcd34d;}
    .badge-fail{background:#ffd5d5;color:#8b1a1a;border:0.5px solid #e08080;}
    .badge-gold{background:rgba(201,169,110,.2);color:#7a4f00;border:0.5px solid rgba(201,169,110,.5);font-weight:600;}
    .tag-pill{display:inline-block;padding:2px 8px;border-radius:var(--r-pill);font-size:11px;font-weight:500;margin:2px;}
    .tag-src{background:#fef3c7;color:#633806;}
    .tag-food{background:#ede9fe;color:#3C3489;}
    .prog-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bg5);}
    .prog-row:last-child{border-bottom:none;}
    .prog-rank{font-size:13px;font-weight:500;color:var(--t3);width:18px;text-align:center;flex-shrink:0;}
    .prog-name{font-size:13px;font-weight:500;color:var(--t1);flex:1;}
    .prog-meta{font-size:11px;color:var(--t3);}
    .ep-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bg5);}
    .ep-row:last-child{border-bottom:none;}
    .ep-date{font-size:11px;color:var(--t3);width:70px;flex-shrink:0;padding-top:2px;}
    .ep-rest{flex:1;min-width:0;}
    .ep-name{font-size:13px;font-weight:500;color:var(--t1);}
    .ep-addr{font-size:11px;color:var(--t3);margin-top:2px;}
    .ep-tags{margin-top:4px;display:flex;gap:3px;flex-wrap:wrap;}
    .ep-status{flex-shrink:0;}
    .log-box{background:var(--bg0);border:0.5px solid var(--bg5);border-radius:var(--r-sm);
      padding:10px;height:120px;overflow-y:auto;font-size:11px;font-family:monospace;color:var(--t3);}
    .log-ok{color:#9fe1cb;} .log-err{color:#f5c4b3;} .log-info{color:var(--gold);}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
    .stat-card{background:var(--bg3);border-radius:var(--r-sm);padding:10px;text-align:center;}
    .stat-val{font-size:20px;font-weight:500;color:var(--t1);}
    .stat-lbl{font-size:10px;color:var(--t3);margin-top:2px;}
    .spinner{width:16px;height:16px;border:2px solid var(--bg5);border-top-color:var(--gold);
      border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .step-badge{display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--gold);
      color:#fff;font-size:11px;font-weight:500;text-align:center;line-height:20px;margin-right:6px;flex-shrink:0;}
    #auth-loading,#login-wrap{text-align:center;padding:80px 20px;}
    .btn-google{display:inline-flex;align-items:center;gap:10px;padding:13px 28px;
      background:var(--gold);color:#fff;border:none;border-radius:var(--r-md);
      font-size:15px;font-weight:500;font-family:var(--font-body);cursor:pointer;}
    .schedule-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--bg5);}
    .schedule-row:last-child{border-bottom:none;}
    .toggle-wrap{width:32px;height:18px;background:var(--gold);border-radius:9px;position:relative;cursor:pointer;flex-shrink:0;}
    .toggle-dot{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;right:2px;transition:.2s;}
    .toggle-off{background:var(--bg5);}
    .toggle-off .toggle-dot{right:auto;left:2px;}
    select.input-field{width:auto;padding:5px 10px;}
  </style>
</head>
<body>

<div id="auth-loading" style="text-align:center;padding:80px 20px;">
  <div style="font-family:var(--font-display);font-size:24px;margin-bottom:20px;">
    My Gourmet<span style="color:var(--gold);">.</span></div>
  <div style="width:32px;height:32px;border:2px solid var(--bg5);border-top-color:var(--gold);
    border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;"></div>
  <div style="font-size:13px;color:var(--t3);">로그인 확인 중…</div>
</div>
<div id="login-wrap" style="display:none;text-align:center;padding:80px 20px;">
  <div style="font-family:var(--font-display);font-size:24px;margin-bottom:6px;">
    My Gourmet<span style="color:var(--gold);">.</span></div>
  <div style="font-size:13px;color:var(--t3);margin-bottom:24px;">로그인이 필요합니다</div>
  <button class="btn-google" id="btn-login">Google로 로그인</button>
</div>

<div id="main-wrap" style="display:none;">
  <div class="top-bar">
    <div class="logo">My Gourmet<span>.</span>
      <span style="font-size:13px;font-weight:400;color:var(--t3);font-family:var(--font-body);"> 방송 맛집 수집</span>
    </div>
    <a href="index.html" style="font-size:12px;color:var(--t3);text-decoration:none;">← 앱으로</a>
  </div>

  <div class="container">

    <!-- API 키 -->
    <div class="card">
      <div class="card-title">⚙️ Claude API 설정</div>
      <div style="display:flex;gap:8px;">
        <input class="input-field" id="api-key-input" type="password" placeholder="sk-ant-api03-…" style="flex:1;"/>
        <button class="btn btn-ghost" id="btn-save-key">저장</button>
      </div>
      <div id="key-status" style="font-size:11px;color:var(--t3);margin-top:6px;"></div>
    </div>

    <!-- 프로그램 관리 -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="display:flex;align-items:center;">
          <span class="step-badge">1</span>
          <span style="font-size:13px;font-weight:500;">수집할 프로그램</span>
        </div>
        <button class="btn btn-ghost btn-sm" id="btn-add-prog">+ 프로그램 추가</button>
      </div>
      <div id="prog-list"></div>
    </div>

    <!-- 프로그램 추가 폼 (숨김) -->
    <div class="card" id="add-prog-form" style="display:none;">
      <div class="card-title">프로그램 추가</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div>
          <label style="font-size:11px;color:var(--t3);">프로그램명</label>
          <input class="input-field" id="new-prog-name" placeholder="예) 줄서는식당" style="margin-top:3px;"/>
        </div>
        <div>
          <label style="font-size:11px;color:var(--t3);">태그 ID (tags.js 기준)</label>
          <input class="input-field" id="new-prog-tag" placeholder="예) source__줄서는식당" style="margin-top:3px;"/>
        </div>
        <div>
          <label style="font-size:11px;color:var(--t3);">방송 요일</label>
          <select class="input-field" id="new-prog-day" style="margin-top:3px;width:auto;">
            <option value="0">일요일</option><option value="1">월요일</option>
            <option value="2">화요일</option><option value="3">수요일</option>
            <option value="4">목요일</option><option value="5">금요일</option>
            <option value="6">토요일</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn btn-gold btn-sm" id="btn-confirm-add-prog">추가</button>
          <button class="btn btn-ghost btn-sm" id="btn-cancel-add-prog">취소</button>
        </div>
      </div>
    </div>

    <!-- 수집 실행 -->
    <div class="card">
      <div style="display:flex;align-items:center;margin-bottom:12px;">
        <span class="step-badge">2</span>
        <span style="font-size:13px;font-weight:500;">수집 실행</span>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
        <div>
          <label style="font-size:11px;color:var(--t3);display:block;margin-bottom:4px;">수집 기준</label>
          <select class="input-field" id="collect-range">
            <option value="recent">최근 3개월 신규분만</option>
            <option value="all">DB 없는 전체 에피소드</option>
            <option value="since">특정 날짜 이후</option>
          </select>
        </div>
        <div id="since-date-wrap" style="display:none;">
          <label style="font-size:11px;color:var(--t3);display:block;margin-bottom:4px;">기준 날짜</label>
          <input type="date" class="input-field" id="since-date" style="width:auto;"/>
        </div>
      </div>
      <button class="btn btn-gold" id="btn-collect">수집 시작</button>
      <button class="btn btn-ghost" id="btn-stop" style="display:none;margin-left:8px;">중단</button>
    </div>

    <!-- 진행 로그 -->
    <div class="card" id="log-card" style="display:none;">
      <div class="card-title">수집 진행</div>
      <div class="log-box" id="log-box"></div>
      <div id="collect-stat" style="font-size:12px;color:var(--t3);margin-top:6px;"></div>
    </div>

    <!-- 결과 -->
    <div class="card" id="result-card" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
        <div style="display:flex;align-items:center;">
          <span class="step-badge">3</span>
          <span style="font-size:13px;font-weight:500;">결과 확인 및 저장</span>
        </div>
        <div style="display:flex;gap:6px;" id="result-badges"></div>
      </div>
      <div class="stat-row" id="stat-row"></div>
      <div id="result-list"></div>
      <div style="border-top:0.5px solid var(--bg5);padding-top:12px;margin-top:4px;
        display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;">
        <button class="btn btn-ghost" id="btn-exclude-fail">정보 부족 제외</button>
        <button class="btn btn-gold" id="btn-save">신규 저장</button>
      </div>
    </div>

    <!-- 정기 수집 스케줄 -->
    <div class="card">
      <div style="display:flex;align-items:center;margin-bottom:14px;">
        <span class="step-badge">4</span>
        <span style="font-size:13px;font-weight:500;">반자동 수집 알림</span>
      </div>
      <div class="schedule-row">
        <div id="schedule-toggle" class="toggle-wrap">
          <div class="toggle-dot"></div>
        </div>
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--t1);">앱 접속 시 수집 알림 활성화</div>
          <div style="font-size:11px;color:var(--t3);margin-top:2px;">
            설정한 요일 이후 앱 접속 시 "새 수집 필요" 알림 표시
          </div>
        </div>
      </div>
      <div id="schedule-detail" style="padding-left:42px;margin-top:10px;display:flex;flex-direction:column;gap:10px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:var(--t2);width:60px;flex-shrink:0;">알림 요일</span>
          <select class="input-field" id="notify-day" style="width:auto;">
            <option value="1">월요일 (백반기행 다음날)</option>
            <option value="2">화요일</option>
            <option value="0">일요일</option>
          </select>
        </div>
        <div style="padding:8px 10px;background:var(--bg3);border-radius:var(--r-sm);font-size:12px;color:var(--t2);">
          <span id="last-collected-text">마지막 수집: 없음</span>
          &nbsp;|&nbsp;
          <span id="next-notify-text">다음 알림: 설정 필요</span>
        </div>
        <button class="btn btn-ghost btn-sm" id="btn-save-schedule" style="width:fit-content;">알림 설정 저장</button>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, query, where, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
import { getAuth, GoogleAuthProvider, onAuthStateChanged, signInWithPopup, setPersistence, browserLocalPersistence }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'

const firebaseConfig = {
  apiKey:"AIzaSyCMkebK6mjc9cGdykCb8uvUNNebMW4v33w",
  authDomain:"my-gourmet-5cf8c.firebaseapp.com",
  projectId:"my-gourmet-5cf8c",
  storageBucket:"my-gourmet-5cf8c.firebasestorage.app",
  messagingSenderId:"696974063978",
  appId:"1:696974063978:web:b86a0f4aef907517c18d13"
}

const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig)
const db   = getFirestore(app)
const auth = getAuth(app)
setPersistence(auth, browserLocalPersistence).catch(()=>{})

let currentUser = null
let results     = []
let stopFlag    = false

// 기본 프로그램 목록
const DEFAULT_PROGRAMS = [
  { name:'백반기행',    tagId:'source__백반기행',   day:0, dbCount:497, active:true,  lastCollected:'2024.03' },
  { name:'생생정보',    tagId:'source__생생정보통',  day:2, dbCount:238, active:true,  lastCollected:'2024.03' },
  { name:'생활의 달인', tagId:'source__생활의달인',  day:1, dbCount:0,   active:false, lastCollected:null },
  { name:'맛있는 녀석들',tagId:'source__맛있는녀석들',day:4,dbCount:0,  active:false, lastCollected:null },
  { name:'흑백요리사',  tagId:'source__흑백요리사',  day:5, dbCount:0,   active:false, lastCollected:null },
]
const DAYS = ['일','월','화','수','목','금','토']

let programs = JSON.parse(localStorage.getItem('mga_programs') || 'null') || DEFAULT_PROGRAMS
let scheduleOn = localStorage.getItem('mga_schedule_on') === 'true'

function savePrograms() { localStorage.setItem('mga_programs', JSON.stringify(programs)) }

// 인증
document.getElementById('auth-loading').style.display = 'block'
document.getElementById('login-wrap').style.display   = 'none'
document.getElementById('main-wrap').style.display    = 'none'

onAuthStateChanged(auth, user => {
  document.getElementById('auth-loading').style.display = 'none'
  if (user) {
    currentUser = user
    document.getElementById('main-wrap').style.display  = 'block'
    document.getElementById('login-wrap').style.display = 'none'
    loadApiKey(); renderPrograms(); renderSchedule()
  } else {
    document.getElementById('login-wrap').style.display = 'block'
    document.getElementById('main-wrap').style.display  = 'none'
  }
})
document.getElementById('btn-login').onclick = () => signInWithPopup(auth, new GoogleAuthProvider())

// API 키
function loadApiKey() {
  const key = localStorage.getItem('mga_claude_key') || ''
  document.getElementById('api-key-input').value = key
  document.getElementById('key-status').textContent = key ? '✓ API 키 저장됨' : ''
}
document.getElementById('btn-save-key').onclick = () => {
  const key = document.getElementById('api-key-input').value.trim()
  localStorage.setItem('mga_claude_key', key)
  document.getElementById('key-status').textContent = key ? '✓ API 키 저장됨' : '삭제됨'
}

// 프로그램 목록 렌더
function renderPrograms() {
  document.getElementById('prog-list').innerHTML = programs.map((p, i) => `
    <div class="prog-row">
      <div class="prog-rank">${i+1}</div>
      <input type="checkbox" data-idx="${i}" ${p.active?'checked':''}
        style="accent-color:var(--gold);width:14px;height:14px;flex-shrink:0;"/>
      <div class="prog-name">${p.name}</div>
      <span class="badge ${p.dbCount>0?'badge-gold':'badge-fail'}" style="font-size:10px;">
        DB ${p.dbCount}개
      </span>
      <span class="prog-meta">${p.lastCollected?`최근 ${p.lastCollected}`:'미수집'}</span>
      <span class="prog-meta" style="color:var(--t4);">${DAYS[p.day]}요일</span>
      <button class="btn btn-ghost btn-sm" data-del="${i}">삭제</button>
    </div>`).join('')

  document.getElementById('prog-list').querySelectorAll('[data-idx]').forEach(cb => {
    cb.addEventListener('change', () => {
      programs[Number(cb.dataset.idx)].active = cb.checked
      savePrograms()
    })
  })
  document.getElementById('prog-list').querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      programs.splice(Number(btn.dataset.del), 1)
      savePrograms(); renderPrograms()
    })
  })
}

// 프로그램 추가
document.getElementById('btn-add-prog').onclick = () => {
  document.getElementById('add-prog-form').style.display = 'block'
}
document.getElementById('btn-cancel-add-prog').onclick = () => {
  document.getElementById('add-prog-form').style.display = 'none'
}
document.getElementById('btn-confirm-add-prog').onclick = () => {
  const name = document.getElementById('new-prog-name').value.trim()
  const tagId = document.getElementById('new-prog-tag').value.trim()
  const day = Number(document.getElementById('new-prog-day').value)
  if (!name) { alert('프로그램명을 입력해주세요'); return }
  programs.push({ name, tagId: tagId || `source__${name}`, day, dbCount:0, active:true, lastCollected:null })
  savePrograms(); renderPrograms()
  document.getElementById('add-prog-form').style.display = 'none'
  document.getElementById('new-prog-name').value = ''
  document.getElementById('new-prog-tag').value = ''
}

// 수집 범위
document.getElementById('collect-range').addEventListener('change', e => {
  document.getElementById('since-date-wrap').style.display =
    e.target.value === 'since' ? 'block' : 'none'
})

// 로그
function log(msg, type='') {
  const box = document.getElementById('log-box')
  const div = document.createElement('div')
  div.className = type ? `log-${type}` : ''
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
  box.appendChild(div); box.scrollTop = box.scrollHeight
}

function normalize(s) { return (s??'').replace(/\s/g,'').toLowerCase() }

// 수집 시작
document.getElementById('btn-collect').onclick = async () => {
  const apiKey = localStorage.getItem('mga_claude_key')
  if (!apiKey) { alert('Claude API 키를 먼저 입력해주세요'); return }
  const activeProgs = programs.filter(p => p.active)
  if (!activeProgs.length) { alert('수집할 프로그램을 선택해주세요'); return }

  stopFlag = false; results = []
  document.getElementById('log-card').style.display    = 'block'
  document.getElementById('result-card').style.display = 'none'
  document.getElementById('log-box').innerHTML = ''
  document.getElementById('btn-collect').disabled = true
  document.getElementById('btn-stop').style.display = 'inline-block'

  const range = document.getElementById('collect-range').value
  const since = document.getElementById('since-date').value
  const rangeText = range === 'recent' ? '최근 3개월' : range === 'all' ? '전체 에피소드' : `${since} 이후`

  log(`수집 시작: ${activeProgs.map(p=>p.name).join(', ')} — ${rangeText}`, 'info')

  // 기존 DB 로드
  const snap = await getDocs(query(collection(db,'restaurants'), where('userId','==',currentUser.uid)))
  const existingNames = new Set(snap.docs.map(d => normalize(d.data().name)))

  for (const prog of activeProgs) {
    if (stopFlag) break
    log(`${prog.name} 수집 중…`, 'info')

    try {
      const prompt = `${prog.name} 방송에서 소개된 맛집 목록을 수집해주세요.
수집 범위: ${rangeText}
웹 검색으로 최신 정보를 찾아주세요.

반드시 아래 JSON 형식으로만 응답하세요:
{
  "program": "${prog.name}",
  "restaurants": [
    {
      "name": "식당명",
      "address": "전체 주소",
      "shortAddr": "시/군/구 단위",
      "phone": "전화번호 또는 null",
      "broadcastDate": "방송일 YYYY-MM-DD",
      "menu": "소개된 메뉴 또는 null",
      "tags": ["food__한식", "${prog.tagId}"]
    }
  ]
}`

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type':'application/json',
          'x-api-key': apiKey,
          'anthropic-version':'2023-06-01',
          'anthropic-beta':'web-search-2025-03-05'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          tools: [{ type:'web_search_20250305', name:'web_search' }],
          messages: [{ role:'user', content: prompt }]
        })
      })

      if (!res.ok) throw new Error(`API ${res.status}`)
      const data = await res.json()
      const textBlock = data.content?.find(b => b.type === 'text')
      if (!textBlock) throw new Error('응답 없음')

      const jsonMatch = textBlock.text.match(/\{[\s\S]*\}/)
      if (!jsonMatch) throw new Error('JSON 파싱 실패')

      const parsed = JSON.parse(jsonMatch[0])
      const restaurants = parsed.restaurants ?? []

      for (const r of restaurants) {
        const isDup = existingNames.has(normalize(r.name))
        results.push({ ...r, program: prog.name, isDup, selected: !isDup })
        log(`${isDup?'[중복]':'[신규]'} ${r.name} — ${r.shortAddr||r.address||'주소없음'} (${r.broadcastDate||'날짜불명'})`, isDup?'':'ok')
      }
      log(`${prog.name} 완료: ${restaurants.length}개 발견`, 'info')

      // 마지막 수집 날짜 업데이트
      prog.lastCollected = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit'}).replace('. ','.')
      savePrograms()

    } catch(e) {
      log(`✗ ${prog.name} 실패: ${e.message}`, 'err')
    }
    await new Promise(r => setTimeout(r, 1000))
  }

  document.getElementById('btn-collect').disabled = false
  document.getElementById('btn-stop').style.display = 'none'

  const newCnt = results.filter(r=>!r.isDup).length
  const dupCnt = results.filter(r=>r.isDup).length
  log(`전체 완료: 신규 ${newCnt}개 / 중복 ${dupCnt}개`, 'info')

  // 마지막 수집 시간 저장
  localStorage.setItem('mga_last_broadcast_collect', new Date().toISOString())
  renderResults()
}

document.getElementById('btn-stop').onclick = () => { stopFlag = true }

function renderResults() {
  const card = document.getElementById('result-card')
  card.style.display = 'block'

  const newCnt  = results.filter(r=>!r.isDup).length
  const dupCnt  = results.filter(r=>r.isDup).length

  document.getElementById('result-badges').innerHTML = `
    <span class="badge badge-new">신규 ${newCnt}개</span>
    ${dupCnt?`<span class="badge badge-dup">중복 ${dupCnt}개</span>`:''}`

  document.getElementById('stat-row').innerHTML = `
    <div class="stat-card"><div class="stat-val">${results.length}</div><div class="stat-lbl">전체 발견</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#1D9E75;">${newCnt}</div><div class="stat-lbl">신규 추가</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#854F0B;">${dupCnt}</div><div class="stat-lbl">이미 DB에 있음</div></div>
    <div class="stat-card"><div class="stat-val">${results.filter(r=>r.selected).length}</div><div class="stat-lbl">선택됨</div></div>`

  document.getElementById('result-list').innerHTML = results.map((r, i) => {
    const tags = (r.tags??[]).map(t => {
      const cat = t.split('__')[0], label = t.split('__')[1]??t
      return `<span class="tag-pill ${cat==='food'?'tag-food':'tag-src'}">${label}</span>`
    }).join('')
    return `
      <div class="ep-row">
        <div style="padding-top:2px;flex-shrink:0;">
          <input type="checkbox" data-idx="${i}" ${r.selected?'checked':''}
            style="accent-color:var(--gold);width:14px;height:14px;"/>
        </div>
        <div class="ep-date">${r.broadcastDate??'날짜 불명'}</div>
        <div class="ep-rest">
          <div class="ep-name">${r.name}</div>
          <div class="ep-addr">${r.address||r.shortAddr||'주소 없음'}</div>
          ${r.menu?`<div style="font-size:11px;color:var(--t2);margin-top:1px;">메뉴: ${r.menu}</div>`:''}
          <div class="ep-tags">${tags}</div>
        </div>
        <div class="ep-status">
          <span class="badge ${r.isDup?'badge-dup':'badge-new'}">${r.isDup?'중복':'신규'}</span>
        </div>
      </div>`
  }).join('')

  document.getElementById('result-list').querySelectorAll('[data-idx]').forEach(cb => {
    cb.addEventListener('change', () => {
      results[Number(cb.dataset.idx)].selected = cb.checked
      updateSaveBtn()
    })
  })
  updateSaveBtn()
}

function updateSaveBtn() {
  const cnt = results.filter(r=>r.selected&&!r.isDup).length
  document.getElementById('btn-save').textContent = `신규 ${cnt}개 저장`
}

document.getElementById('btn-exclude-fail').onclick = () => {
  results.forEach(r => { if (!r.address) r.selected = false })
  renderResults()
}

document.getElementById('btn-save').onclick = async () => {
  const toSave = results.filter(r => r.selected && !r.isDup)
  if (!toSave.length) { alert('저장할 신규 항목을 선택해주세요'); return }
  const btn = document.getElementById('btn-save')
  btn.disabled = true; btn.textContent = '저장 중…'
  let saved = 0, failed = 0
  for (const r of toSave) {
    try {
      await addDoc(collection(db,'restaurants'), {
        userId: currentUser.uid, name: r.name, address: r.address??'',
        shortAddr: r.shortAddr??'', phone: r.phone??'', hours: null, memo: '',
        tagIds: r.tags??[], lat: null, lng: null, rating: null, visitLog: [],
        source: 'broadcast',
        broadcast: { program: r.program, date: r.broadcastDate??null },
        createdAt: serverTimestamp(), updatedAt: serverTimestamp()
      })
      saved++
    } catch(e) { failed++; console.error(e) }
  }
  btn.disabled = false
  alert(`완료! ${saved}개 저장${failed?` / 실패 ${failed}개`:''}`)
  btn.textContent = '저장 완료'
  renderPrograms()
}

// 스케줄 관리
function renderSchedule() {
  const toggle = document.getElementById('schedule-toggle')
  toggle.className = `toggle-wrap${scheduleOn?'':' toggle-off'}`
  document.getElementById('schedule-detail').style.opacity = scheduleOn ? '1' : '0.5'

  const last = localStorage.getItem('mga_last_broadcast_collect')
  document.getElementById('last-collected-text').textContent =
    last ? `마지막 수집: ${new Date(last).toLocaleDateString('ko-KR')}` : '마지막 수집: 없음'

  const notifyDay = Number(localStorage.getItem('mga_notify_day') ?? '1')
  document.getElementById('notify-day').value = notifyDay

  if (scheduleOn) {
    const today = new Date()
    const daysUntil = (notifyDay - today.getDay() + 7) % 7 || 7
    const nextDate = new Date(today); nextDate.setDate(today.getDate() + daysUntil)
    document.getElementById('next-notify-text').textContent =
      `다음 알림: ${nextDate.toLocaleDateString('ko-KR')} (${DAYS[notifyDay]}요일)`
  } else {
    document.getElementById('next-notify-text').textContent = '다음 알림: 비활성화'
  }
}

document.getElementById('schedule-toggle').onclick = () => {
  scheduleOn = !scheduleOn
  localStorage.setItem('mga_schedule_on', scheduleOn)
  renderSchedule()
}

document.getElementById('btn-save-schedule').onclick = () => {
  const day = document.getElementById('notify-day').value
  localStorage.setItem('mga_notify_day', day)
  renderSchedule()
  alert('알림 설정이 저장되었습니다.')
}
</script>
