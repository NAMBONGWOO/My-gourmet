<!DOCTYPE html>
<html lang="ko" class="page-scroll">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MGA — 데이터 뷰어</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/tokens.css"/>
  <style>
    body{background:var(--bg0);color:var(--t1);min-height:100vh;font-family:var(--font-body);}
    .top-bar{position:sticky;top:0;z-index:100;background:var(--bg1);border-bottom:0.5px solid var(--bg5);
      padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .logo{font-family:var(--font-display);font-size:18px;}
    .logo span{color:var(--gold);}
    .badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:500;}
    .badge-gold{background:rgba(201,169,110,.2);color:#7a4f00;border:0.5px solid rgba(201,169,110,.5);font-weight:600;}
    .badge-green{background:#c8f0e0;color:#1a5c3a;border:0.5px solid #5aad80;font-weight:600;}
    .badge-red{background:#ffd5d5;color:#8b1a1a;border:0.5px solid #e08080;font-weight:600;}
    .badge-blue{background:#d0e8ff;color:#1a3a6b;border:0.5px solid #6699cc;font-weight:600;}
    .badge-gray{background:var(--bg3);color:var(--t3);border:0.5px solid var(--bg5);}
    .controls{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:0.5px solid var(--bg5);}
    .search-input{flex:1;min-width:180px;padding:8px 12px;background:var(--bg2);
      border:0.5px solid var(--bg5);border-radius:var(--r-sm);font-size:13px;
      color:var(--t1);font-family:var(--font-body);outline:none;}
    .search-input:focus{border-color:var(--gold);}
    select{padding:8px 12px;background:var(--bg2);border:0.5px solid var(--bg5);
      border-radius:var(--r-sm);font-size:13px;color:var(--t1);font-family:var(--font-body);outline:none;cursor:pointer;}
    .btn{padding:8px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:500;
      font-family:var(--font-body);cursor:pointer;border:0.5px solid var(--bg5);}
    .btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);}
    .btn-ghost{background:var(--bg3);color:var(--t2);}
    .table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 160px);}
    table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px;}
    thead th{position:sticky;top:0;z-index:10;background:var(--bg2);color:var(--t3);
      padding:10px 12px;text-align:left;font-weight:500;border-bottom:0.5px solid var(--bg5);
      white-space:nowrap;cursor:pointer;user-select:none;}
    thead th:hover{color:var(--gold);}
    thead th.sort-asc::after{content:' ▲';color:var(--gold);}
    thead th.sort-desc::after{content:' ▼';color:var(--gold);}
    td{padding:9px 12px;border-bottom:0.5px solid var(--bg4);color:var(--t2);vertical-align:top;}
    td.truncate{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    tr:hover td{background:var(--bg2);}
    .tag-pill{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;
      background:var(--bg3);color:var(--t2);border:0.5px solid var(--bg5);margin:1px;}
    .field-ok{color:#9fe1cb;}
    .field-empty{color:var(--t4);font-style:italic;}
    .spinner{width:32px;height:32px;border:2px solid var(--bg5);border-top-color:var(--gold);
      border-radius:50%;animation:spin .7s linear infinite;margin:60px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .login-wrap{text-align:center;padding:80px 20px;}
    .btn-google{display:inline-flex;align-items:center;gap:10px;padding:13px 28px;
      background:var(--gold);color:#fff;border:none;border-radius:var(--r-md);
      font-size:15px;font-weight:500;font-family:var(--font-body);cursor:pointer;}
    .detail-panel{position:fixed;top:0;right:0;width:360px;height:100vh;
      background:var(--bg1);border-left:0.5px solid var(--bg5);
      overflow-y:auto;z-index:200;padding:20px;box-shadow:-4px 0 20px rgba(0,0,0,.3);}
    .detail-panel h3{font-size:15px;font-weight:500;margin-bottom:14px;color:var(--t1);}
    .field-row{margin-bottom:10px;}
    .field-label{font-size:10px;color:var(--t3);letter-spacing:0.05em;margin-bottom:3px;}
    .field-value{font-size:13px;color:var(--t1);line-height:1.6;word-break:break-all;}
    .close-btn{position:absolute;top:16px;right:16px;background:var(--bg3);border:0.5px solid var(--bg5);
      border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:14px;color:var(--t2);}
  </style>
</head>
<body>

<div id="auth-loading" style="text-align:center;padding:80px 20px;">
  <div style="font-family:var(--font-display);font-size:24px;margin-bottom:20px;">My Gourmet<span style="color:var(--gold);">.</span></div>
  <div style="width:32px;height:32px;border:2px solid var(--bg5);border-top-color:var(--gold);
    border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;"></div>
  <div style="font-size:13px;color:var(--t3);">로그인 확인 중…</div>
</div>
<div id="login-wrap" class="login-wrap">
  <div style="font-family:var(--font-display);font-size:24px;margin-bottom:6px;">My Gourmet<span style="color:var(--gold);">.</span></div>
  <div style="font-size:13px;color:var(--t3);margin-bottom:24px;">데이터 뷰어 — 로그인이 필요합니다</div>
  <button class="btn-ghost" style="padding:12px 24px;width:auto;" id="btn-login">앱에서 먼저 로그인해주세요</button>
</div>

<div id="main-wrap" style="display:none;">
  <div class="top-bar">
    <div class="logo">My Gourmet<span>.</span> <span style="font-size:13px;font-weight:400;color:var(--t3);font-family:var(--font-body);">데이터 뷰어</span></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span class="badge badge-gold" id="badge-total">전체 0개</span>
      <span class="badge badge-green" id="badge-coord">좌표 있음 0개</span>
      <span class="badge badge-red" id="badge-nocoord">좌표 없음 0개</span>
      <span class="badge badge-blue" id="badge-tags">태그 있음 0개</span>
      <span class="badge badge-gray" id="badge-notags">태그 없음 0개</span>
      <button class="btn btn-ghost" id="btn-export">📥 CSV 내보내기 ▾</button>
      <button class="btn btn-ghost" id="btn-nocoord-csv" style="background:#d0e8ff;color:#1a3a6b;border-color:#6699cc;">📍 좌표없음 목록</button>
      <button class="btn" id="btn-delete-selected" style="background:#fff3cd;color:#7d3800;border-color:#fcd34d;display:none;">☑️ 선택 삭제 (<span id="sel-count">0</span>)</button>
      <button class="btn" id="btn-delete-all" style="background:#ffd5d5;color:#8b1a1a;border-color:#e08080;">🗑️ 전체 삭제</button>
      <a href="index.html" style="font-size:12px;color:var(--t3);text-decoration:none;">← 앱으로</a>
    </div>
  </div>

  <div class="controls">
    <input class="search-input" id="search-input" placeholder="상호명, 주소, 태그 검색…" autocomplete="off"/>
    <select id="filter-coord">
      <option value="all">전체</option>
      <option value="has">좌표 있음</option>
      <option value="none">좌표 없음</option>
    </select>
    <select id="filter-tags">
      <option value="all">태그 전체</option>
      <option value="has">태그 있음</option>
      <option value="none">태그 없음</option>
    </select>
    <select id="filter-source">
      <option value="all">출처 전체</option>
    </select>
    <span style="font-size:12px;color:var(--t3);" id="result-count"></span>
  </div>

  <div id="loading-area" style="text-align:center;padding:40px;">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--t3);">데이터 불러오는 중…</div>
  </div>

  <div class="table-wrap" id="table-wrap" style="display:none;">
    <table id="data-table">
      <thead>
        <tr>
          <th style="width:32px;"><input type="checkbox" id="chk-all" style="accent-color:var(--gold);width:13px;height:13px;cursor:pointer;"/></th>
          <th data-col="idx">#</th>
          <th data-col="name">상호명</th>
          <th data-col="address">주소</th>
          <th data-col="shortAddr">단축주소</th>
          <th data-col="phone">전화</th>
          <th data-col="hours">영업시간</th>
          <th data-col="lat">위도</th>
          <th data-col="lng">경도</th>
          <th data-col="tagIds">태그</th>
          <th data-col="rating">평점</th>
          <th data-col="memo">메모</th>
          <th data-col="visitLog">방문기록</th>
          <th data-col="source">출처</th>
          <th data-col="createdAt">등록일</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<div id="detail-panel" class="detail-panel" style="display:none;"></div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
import { getFirestore, collection, getDocs, query, where, orderBy, doc, updateDoc, deleteDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
import { getAuth, GoogleAuthProvider, onAuthStateChanged, setPersistence, browserLocalPersistence }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'

const firebaseConfig = {
  apiKey:            "AIzaSyCMkebK6mjc9cGdykCb8uvUNNebMW4v33w",
  authDomain:        "my-gourmet-5cf8c.firebaseapp.com",
  projectId:         "my-gourmet-5cf8c",
  storageBucket:     "my-gourmet-5cf8c.firebasestorage.app",
  messagingSenderId: "696974063978",
  appId:             "1:696974063978:web:b86a0f4aef907517c18d13"
}

// 이미 초기화된 앱이 있으면 재사용 (로그인 세션 유지)
const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig)
const db   = getFirestore(app)
const auth = getAuth(app)
setPersistence(auth, browserLocalPersistence).catch(e => console.warn('persistence error', e))

let allData    = []
let filtered   = []
let sortCol    = 'idx'
let sortDir    = 'asc'
let currentUser = null

// 초기 로딩 중 표시
document.getElementById('login-wrap').style.display  = 'none'
document.getElementById('main-wrap').style.display   = 'none'
document.getElementById('auth-loading').style.display = 'block'

onAuthStateChanged(auth, async user => {
  document.getElementById('auth-loading').style.display = 'none'
  if (user) {
    currentUser = user
    document.getElementById('login-wrap').style.display = 'none'
    document.getElementById('main-wrap').style.display  = 'block'
    await loadData()
  } else {
    document.getElementById('login-wrap').style.display = 'block'
    document.getElementById('main-wrap').style.display  = 'none'
    // 리다이렉트 제거 — 다른 탭 로그인 세션 간섭 방지
  }
})

document.getElementById('btn-login').onclick =
  () => window.location.href = 'index.html'

async function loadData() {
  document.getElementById('loading-area').style.display = 'block'
  document.getElementById('table-wrap').style.display   = 'none'

  const snap = await getDocs(
    query(collection(db,'restaurants'),
      where('userId','==', currentUser.uid),
      orderBy('createdAt','desc'))
  )
  allData = snap.docs.map((d,i) => ({ _idx: i+1, id: d.id, ...d.data() }))

  // 출처 필터 옵션 구성
  const sources = [...new Set(allData.flatMap(r => (r.tagIds??[]).filter(t=>t.startsWith('source__'))))]
  const sel = document.getElementById('filter-source')
  sources.forEach(s => {
    const opt = document.createElement('option')
    opt.value = s; opt.textContent = s.replace('source__','')
    sel.appendChild(opt)
  })

  updateBadges()
  applyFilters()
  document.getElementById('loading-area').style.display = 'none'
  document.getElementById('table-wrap').style.display   = 'block'
}

function updateBadges() {
  const total    = allData.length
  const hasCoord = allData.filter(r => r.lat && r.lng).length
  const hasTags  = allData.filter(r => (r.tagIds??[]).length > 0).length
  document.getElementById('badge-total').textContent   = `전체 ${total}개`
  document.getElementById('badge-coord').textContent   = `좌표 있음 ${hasCoord}개`
  document.getElementById('badge-nocoord').textContent = `좌표 없음 ${total - hasCoord}개`
  document.getElementById('badge-tags').textContent    = `태그 있음 ${hasTags}개`
  document.getElementById('badge-notags').textContent  = `태그 없음 ${total - hasTags}개`
}

function applyFilters() {
  const q      = document.getElementById('search-input').value.trim().toLowerCase()
  const fCoord = document.getElementById('filter-coord').value
  const fTags  = document.getElementById('filter-tags').value
  const fSrc   = document.getElementById('filter-source').value

  filtered = allData.filter(r => {
    if (fCoord === 'has'  && !(r.lat && r.lng)) return false
    if (fCoord === 'none' && (r.lat && r.lng))  return false
    if (fTags  === 'has'  && !(r.tagIds??[]).length) return false
    if (fTags  === 'none' &&  (r.tagIds??[]).length) return false
    if (fSrc !== 'all' && !(r.tagIds??[]).includes(fSrc)) return false
    if (q) {
      const match =
        (r.name??'').toLowerCase().includes(q) ||
        (r.address??'').toLowerCase().includes(q) ||
        (r.shortAddr??'').toLowerCase().includes(q) ||
        (r.phone??'').includes(q) ||
        (r.tagIds??[]).some(t => t.toLowerCase().includes(q)) ||
        (r.memo??'').toLowerCase().includes(q)
      if (!match) return false
    }
    return true
  })

  sortData()
  renderTable()
  document.getElementById('result-count').textContent = `${filtered.length}개 표시 중`
}

function sortData() {
  filtered.sort((a, b) => {
    let va = a[sortCol] ?? '', vb = b[sortCol] ?? ''
    if (sortCol === 'idx') { va = a._idx; vb = b._idx }
    if (sortCol === 'tagIds') { va = (a.tagIds??[]).length; vb = (b.tagIds??[]).length }
    if (sortCol === 'visitLog') { va = (a.visitLog??[]).length; vb = (b.visitLog??[]).length }
    if (sortCol === 'createdAt') {
      va = a.createdAt?.seconds ?? 0; vb = b.createdAt?.seconds ?? 0
    }
    if (typeof va === 'string') va = va.toLowerCase()
    if (typeof vb === 'string') vb = vb.toLowerCase()
    if (va < vb) return sortDir === 'asc' ? -1 : 1
    if (va > vb) return sortDir === 'asc' ? 1 : -1
    return 0
  })
}

let selectedIds = new Set()

function renderTable() {
  const tbody = document.getElementById('table-body')
  tbody.innerHTML = filtered.map(r => {
    const hasCoord = r.lat && r.lng
    const tagCount = (r.tagIds??[]).length
    const visitCount = (r.visitLog??[]).length
    const createdAt = r.createdAt?.seconds
      ? new Date(r.createdAt.seconds*1000).toLocaleDateString('ko-KR')
      : ''
    const tags = (r.tagIds??[]).slice(0,2).map(t =>
      `<span class="tag-pill">${t.split('__')[1]??t}</span>`).join('') +
      (tagCount > 2 ? `<span class="tag-pill">+${tagCount-2}</span>` : '')

    return `<tr data-id="${r.id}" style="cursor:pointer;">
      <td onclick="event.stopPropagation()">
        <input type="checkbox" class="row-chk" data-id="${r.id}" ${selectedIds.has(r.id)?'checked':''}
          style="accent-color:var(--gold);width:13px;height:13px;cursor:pointer;"/>
      </td>
      <td style="color:var(--t4);white-space:nowrap;">${r._idx}</td>
      <td class="truncate" style="font-weight:500;color:var(--t1);max-width:140px;">${r.name??''}</td>
      <td class="truncate">${r.address??'<span class="field-empty">없음</span>'}</td>
      <td class="truncate" style="max-width:100px;">${r.shortAddr??'<span class="field-empty">없음</span>'}</td>
      <td style="white-space:nowrap;">${r.phone??'<span class="field-empty">없음</span>'}</td>
      <td class="truncate" style="max-width:120px;">${r.hours??'<span class="field-empty">없음</span>'}</td>
      <td style="white-space:nowrap;${hasCoord?'color:var(--gold)':''}">${r.lat?r.lat.toFixed(4):'<span class="field-empty">없음</span>'}</td>
      <td style="white-space:nowrap;${hasCoord?'color:var(--gold)':''}">${r.lng?r.lng.toFixed(4):'<span class="field-empty">없음</span>'}</td>
      <td style="white-space:nowrap;">${tagCount?tags:`<span class="field-empty">없음</span>`}</td>
      <td style="white-space:nowrap;">${r.rating?`<span style="color:var(--gold);">★ ${r.rating.toFixed(1)}</span>`:'<span class="field-empty">없음</span>'}</td>
      <td class="truncate" style="max-width:120px;">${r.memo??'<span class="field-empty">없음</span>'}</td>
      <td style="white-space:nowrap;text-align:center;">${visitCount?`<span class="badge badge-blue">${visitCount}회</span>`:'<span class="field-empty">없음</span>'}</td>
      <td style="white-space:nowrap;">${r.source??'<span class="field-empty">없음</span>'}</td>
      <td style="white-space:nowrap;color:var(--t3);">${createdAt}</td>
    </tr>`
  }).join('')

  // 체크박스 이벤트
  tbody.querySelectorAll('.row-chk').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) selectedIds.add(cb.dataset.id)
      else selectedIds.delete(cb.dataset.id)
      updateSelectionUI()
    })
  })

  // 전체선택 체크박스 상태 동기화
  const chkAll = document.getElementById('chk-all')
  const visibleIds = filtered.map(r=>r.id)
  const allChecked = visibleIds.length > 0 && visibleIds.every(id => selectedIds.has(id))
  chkAll.checked = allChecked
  chkAll.indeterminate = !allChecked && visibleIds.some(id => selectedIds.has(id))

  // 행 클릭 → 상세 패널
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => {
      const r = allData.find(x => x.id === tr.dataset.id)
      if (r) showDetail(r)
    })
  })

  // 헤더 정렬
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.className = th.dataset.col === sortCol ? `sort-${sortDir}` : ''
    th.onclick = () => {
      if (sortCol === th.dataset.col) sortDir = sortDir==='asc'?'desc':'asc'
      else { sortCol = th.dataset.col; sortDir = 'asc' }
      sortData(); renderTable()
    }
  })
}

function updateSelectionUI() {
  const cnt = selectedIds.size
  document.getElementById('sel-count').textContent = cnt
  document.getElementById('btn-delete-selected').style.display = cnt > 0 ? '' : 'none'
}

function showDetail(r) {
  const panel = document.getElementById('detail-panel')
  panel.innerHTML = ''
  panel.style.display = 'block'

  const createdAt = r.createdAt?.seconds
    ? new Date(r.createdAt.seconds*1000).toLocaleString('ko-KR') : '없음'
  const updatedAt = r.updatedAt?.seconds
    ? new Date(r.updatedAt.seconds*1000).toLocaleString('ko-KR') : '없음'

  // 닫기 버튼
  const closeBtn = document.createElement('div')
  closeBtn.className = 'close-btn'
  closeBtn.textContent = '×'
  closeBtn.onclick = () => { panel.style.display = 'none' }
  panel.appendChild(closeBtn)

  // 제목
  const h3 = document.createElement('h3')
  h3.textContent = r.name
  panel.appendChild(h3)

  const idDiv = document.createElement('div')
  idDiv.style.cssText = 'font-size:10px;color:var(--t4);margin-bottom:16px;word-break:break-all;'
  idDiv.textContent = 'ID: ' + r.id
  panel.appendChild(idDiv)

  // 편집 가능한 필드 생성 함수
  function addEditableField(label, key, val, type='text') {
    const row = document.createElement('div')
    row.className = 'field-row'

    const lbl = document.createElement('div')
    lbl.className = 'field-label'
    lbl.textContent = label
    row.appendChild(lbl)

    // 표시 영역
    const display = document.createElement('div')
    display.className = 'field-value'
    display.id = 'display-' + key

    const valSpan = document.createElement('span')
    valSpan.className = val != null && val !== '' ? 'field-ok' : 'field-empty'
    valSpan.textContent = val != null && val !== '' ? String(val) : '없음'
    display.appendChild(valSpan)

    const editBtn = document.createElement('button')
    editBtn.textContent = '✏️'
    editBtn.style.cssText = 'margin-left:6px;font-size:10px;color:var(--gold);background:rgba(201,169,110,.1);border:0.5px solid rgba(201,169,110,.3);padding:1px 6px;border-radius:4px;cursor:pointer;'
    editBtn.onclick = () => { display.style.display = 'none'; editWrap.style.display = 'block'; input.focus() }
    display.appendChild(editBtn)
    row.appendChild(display)

    // 편집 영역
    const editWrap = document.createElement('div')
    editWrap.id = 'edit-' + key
    editWrap.style.display = 'none'

    let input
    if (type === 'textarea') {
      input = document.createElement('textarea')
      input.rows = 3
      input.style.cssText = 'width:100%;padding:6px;background:var(--bg2);border:0.5px solid var(--gold);border-radius:4px;font-size:12px;color:var(--t1);font-family:var(--font-body);resize:vertical;box-sizing:border-box;'
      input.value = val ?? ''
    } else {
      input = document.createElement('input')
      input.type = type
      input.style.cssText = 'width:100%;padding:6px;background:var(--bg2);border:0.5px solid var(--gold);border-radius:4px;font-size:12px;color:var(--t1);font-family:var(--font-body);box-sizing:border-box;'
      input.value = val ?? ''
    }
    input.id = 'input-' + key
    editWrap.appendChild(input)

    const btnRow = document.createElement('div')
    btnRow.style.cssText = 'display:flex;gap:6px;margin-top:4px;'

    const saveBtn = document.createElement('button')
    saveBtn.textContent = '저장'
    saveBtn.style.cssText = 'flex:1;padding:5px;background:var(--gold);color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--font-body);'
    saveBtn.onclick = async () => {
      let newVal = input.value.trim()
      if (type === 'number') newVal = newVal ? Number(newVal) : null
      try {
        await updateDoc(doc(db, 'restaurants', r.id), { [key]: newVal, updatedAt: serverTimestamp() })
        const idx = allData.findIndex(x => x.id === r.id)
        if (idx >= 0) allData[idx][key] = newVal
        r[key] = newVal
        valSpan.className = newVal != null && newVal !== '' ? 'field-ok' : 'field-empty'
        valSpan.textContent = newVal != null && newVal !== '' ? String(newVal) : '없음'
        display.style.display = ''
        editWrap.style.display = 'none'
        applyFilters()
      } catch(e) { alert('저장 실패: ' + e.message) }
    }
    btnRow.appendChild(saveBtn)

    const cancelBtn = document.createElement('button')
    cancelBtn.textContent = '취소'
    cancelBtn.style.cssText = 'flex:1;padding:5px;background:var(--bg3);color:var(--t2);border:0.5px solid var(--bg5);border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--font-body);'
    cancelBtn.onclick = () => { display.style.display = ''; editWrap.style.display = 'none' }
    btnRow.appendChild(cancelBtn)

    editWrap.appendChild(btnRow)
    row.appendChild(editWrap)
    panel.appendChild(row)
  }

  addEditableField('상호명',   'name',      r.name)
  addEditableField('주소',     'address',   r.address)
  addEditableField('단축주소', 'shortAddr', r.shortAddr)
  addEditableField('전화번호', 'phone',     r.phone)
  addEditableField('영업시간', 'hours',     r.hours)
  addEditableField('위도',     'lat',       r.lat,    'number')
  addEditableField('경도',     'lng',       r.lng,    'number')
  addEditableField('평점',     'rating',    r.rating, 'number')
  addEditableField('메모',     'memo',      r.memo,   'textarea')

  // 태그
  const tagRow = document.createElement('div')
  tagRow.className = 'field-row'
  tagRow.innerHTML = `<div class="field-label">태그 (${(r.tagIds??[]).length}개)</div>
    <div class="field-value" style="display:flex;flex-wrap:wrap;gap:4px;">${(r.tagIds??[]).length
      ? (r.tagIds??[]).map(t=>{
          const parts = t.split('__')
          const label = parts[1] ?? t
          const cat   = parts[0] ?? ''
          const colors = {food:'#ede9fe;color:#5f3dc4',source:'#fff3cd;color:#7d3800',
            status:'#f3e8ff;color:#6a0dad',purpose:'#dbeafe;color:#1864ab',
            space:'#fef9c3;color:#7a5800',facility:'#dcfce7;color:#1a5c2a'}
          const c = colors[cat] ?? 'var(--bg3);color:var(--t2)'
          return `<span style="padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;background:${c};border:0.5px solid rgba(0,0,0,.1);">${label}</span>`
        }).join('')
      : '<span class="field-empty">없음</span>'}</div>`
  panel.appendChild(tagRow)

  // 방송 정보
  if (r.broadcast) {
    const bcRow = document.createElement('div')
    bcRow.className = 'field-row'
    bcRow.innerHTML = `<div class="field-label">방송 출연</div>
      <div class="field-value">
        <span style="padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;
          background:#fff3cd;color:#7d3800;border:0.5px solid rgba(0,0,0,.1);">
          ${r.broadcast.program??''}
        </span>
        <span style="font-size:12px;color:var(--t3);margin-left:6px;">${r.broadcast.date??''}</span>
      </div>`
    panel.appendChild(bcRow)
  }

  // 방문기록
  const visitRow = document.createElement('div')
  visitRow.className = 'field-row'
  visitRow.innerHTML = `<div class="field-label">방문기록 (${(r.visitLog??[]).length}회)</div>
    <div class="field-value">${(r.visitLog??[]).length
      ? [...(r.visitLog??[])].reverse().map(v=>`
        <div style="padding:8px;background:var(--bg2);border-radius:6px;margin-bottom:6px;">
          <div style="display:flex;justify-content:space-between;">
            <span style="font-size:11px;color:var(--t3);">${v.date??''}</span>
            <span style="color:var(--gold);">${'★'.repeat(v.rating??0)}</span>
          </div>
          ${v.memo?`<div style="font-size:12px;color:var(--t2);margin-top:4px;">${v.memo}</div>`:''}
        </div>`).join('')
      : '<span class="field-empty">없음</span>'}</div>`
  panel.appendChild(visitRow)

  // 등록/수정일
  ;[['등록일', createdAt],['수정일', updatedAt]].forEach(([label, val]) => {
    const row = document.createElement('div')
    row.className = 'field-row'
    row.innerHTML = `<div class="field-label">${label}</div>
      <div class="field-value"><span class="field-ok">${val}</span></div>`
    panel.appendChild(row)
  })

  // 앱에서 보기
  const linkDiv = document.createElement('div')
  linkDiv.style.marginTop = '16px'
  linkDiv.innerHTML = `<a href="index.html"
    style="display:block;padding:10px;background:var(--gold);color:#fff;
    border-radius:var(--r-sm);text-align:center;text-decoration:none;font-size:13px;font-weight:500;">
    앱에서 보기 →</a>`
  panel.appendChild(linkDiv)


}

// 외부 클릭으로 패널 닫기 — 전역 단일 리스너
document.addEventListener('click', e => {
  const panel = document.getElementById('detail-panel')
  if (panel.style.display === 'none') return
  const isInsidePanel = panel.contains(e.target)
  const isTableRow = e.target.closest('tr[data-id]')
  if (!isInsidePanel && !isTableRow) {
    panel.style.display = 'none'
  }
})

function field(label, value) {
  return `<div class="field-row">
    <div class="field-label">${label}</div>
    <div class="field-value">${value!=null&&value!==''
      ? `<span class="field-ok">${value}</span>`
      : '<span class="field-empty">없음</span>'}</div>
  </div>`
}

// 필터 이벤트
['search-input','filter-coord','filter-tags','filter-source'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters)
  document.getElementById(id).addEventListener('change', applyFilters)
})

// ── 전체 데이터 삭제 ──
document.getElementById('btn-delete-all').addEventListener('click', async () => {
  if (!allData.length) { alert('삭제할 데이터가 없습니다'); return }

  const firstConfirm = confirm(
    `⚠️ 전체 데이터 삭제\n\n총 ${allData.length}개의 식당 데이터를 모두 삭제합니다.\n이 작업은 되돌릴 수 없습니다.\n\n계속하시겠습니까?`
  )
  if (!firstConfirm) return

  const secondConfirm = confirm(
    `🚨 최종 확인\n\n정말로 ${allData.length}개 데이터를 영구 삭제합니까?\n\n"확인"을 누르면 즉시 삭제가 시작됩니다.`
  )
  if (!secondConfirm) return

  const btn = document.getElementById('btn-delete-all')
  btn.disabled = true
  btn.textContent = '삭제 중…'

  let deleted = 0
  let failed  = 0

  // Firestore는 일괄 삭제 없음 — 개별 삭제 (배치 500개 제한 고려)
  const BATCH = 20  // 동시 요청 20개씩
  for (let i = 0; i < allData.length; i += BATCH) {
    const chunk = allData.slice(i, i + BATCH)
    await Promise.all(chunk.map(async r => {
      try {
        await deleteDoc(doc(db, 'restaurants', r.id))
        deleted++
      } catch(e) {
        failed++
        console.error('삭제 실패:', r.id, e)
      }
    }))
    btn.textContent = `삭제 중… ${deleted}/${allData.length}`
  }

  btn.disabled = false
  btn.textContent = '🗑️ 전체 삭제'

  const msg = failed
    ? `삭제 완료: ${deleted}개 성공 / ${failed}개 실패\n페이지를 새로고침합니다.`
    : `✅ ${deleted}개 전체 삭제 완료!\n페이지를 새로고침합니다.`
  alert(msg)
  window.location.reload()
})

// 전체선택 체크박스
document.getElementById('chk-all').addEventListener('change', (e) => {
  filtered.forEach(r => {
    if (e.target.checked) selectedIds.add(r.id)
    else selectedIds.delete(r.id)
  })
  renderTable()
  updateSelectionUI()
})

// ── 선별 삭제 ──
document.getElementById('btn-delete-selected').addEventListener('click', async () => {
  const ids = [...selectedIds]
  if (!ids.length) return
  const confirm1 = confirm(`☑️ 선택 항목 삭제\n\n선택된 ${ids.length}개 항목을 삭제합니다.\n이 작업은 되돌릴 수 없습니다.\n\n계속하시겠습니까?`)
  if (!confirm1) return

  const btn = document.getElementById('btn-delete-selected')
  btn.disabled = true
  btn.innerHTML = '삭제 중…'

  let deleted = 0, failed = 0
  const BATCH = 20
  for (let i = 0; i < ids.length; i += BATCH) {
    await Promise.all(ids.slice(i, i+BATCH).map(async id => {
      try {
        await deleteDoc(doc(db, 'restaurants', id))
        deleted++
      } catch(e) { failed++; console.error('삭제 실패:', id, e) }
    }))
  }

  selectedIds.clear()
  btn.disabled = false
  btn.innerHTML = '☑️ 선택 삭제 (<span id="sel-count">0</span>)'
  btn.style.display = 'none'

  alert(failed
    ? `삭제 완료: ${deleted}개 성공 / ${failed}개 실패`
    : `✅ ${deleted}개 삭제 완료!`)
  window.location.reload()
})

// ── CSV 공통 유틸 ──
function _esc(v) {
  if (v == null || v === '') return ''
  const s = String(v)
  return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s
}
function _tagLabel(t) { return t ? (t.includes('__') ? t.split('__')[1] : t) : '' }

const EXPORT_HEADER = 'name,address,shortAddr,phone,hours,memo,tag1,tag2,tag3,tag4,broadcast_program,broadcast_date'

function buildExportRow(r) {
  const tags = (r.tagIds ?? []).slice(0, 4).map(_tagLabel)
  return [
    _esc(r.name), _esc(r.address), _esc(r.shortAddr), _esc(r.phone),
    _esc(r.hours), _esc(r.memo),
    _esc(tags[0]??''), _esc(tags[1]??''), _esc(tags[2]??''), _esc(tags[3]??''),
    _esc(r.broadcast?.program ?? ''), _esc(r.broadcast?.date ?? '')
  ].join(',')
}

// ── 좌표 없는 목록 CSV 다운로드 ──
document.getElementById('btn-nocoord-csv').addEventListener('click', () => {
  const noCoord = allData.filter(r => !r.lat || !r.lng)
  if (!noCoord.length) { alert('좌표 없는 항목이 없습니다 🎉'); return }
  const csv = '\uFEFF' + [EXPORT_HEADER, ...noCoord.map(buildExportRow)].join('\n')
  const a = document.createElement('a')
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}))
  a.download = `MGA_좌표없음_${new Date().toISOString().slice(0,10)}.csv`
  a.click()
  alert(`📍 좌표 없는 항목 ${noCoord.length}개를 CSV로 내보냈습니다.\n\n주소를 수정한 후 upload.html에서 [업데이트 모드]로 재업로드하면 됩니다.`)
})

// ── CSV 내보내기 (upload.html 동일 포맷 + 빈칸필터 옵션) ──
document.getElementById('btn-export').addEventListener('click', () => {
  const existing = document.getElementById('export-sheet')
  if (existing) { existing.remove(); return }

  const sheet = document.createElement('div')
  sheet.id = 'export-sheet'
  sheet.style.cssText = `position:fixed;top:0;right:0;width:280px;height:100vh;
    background:var(--bg1);border-left:0.5px solid var(--bg5);z-index:300;
    padding:20px;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.3);`

  const EMPTY_OPTS = [
    { key:'address', label:'주소',     get: r => r.address??'' },
    { key:'phone',   label:'전화번호', get: r => r.phone??'' },
    { key:'hours',   label:'영업시간', get: r => r.hours??'' },
    { key:'lat',     label:'좌표',     get: r => r.lat??'' },
    { key:'memo',    label:'메모',     get: r => r.memo??'' },
  ]
  const emptyFilter = new Set()
  let scope = 'filtered'

  function renderSheet() {
    sheet.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <p style="font-size:14px;font-weight:500;">📥 CSV 내보내기</p>
        <button id="close-export" style="background:var(--bg3);border:0.5px solid var(--bg5);
          border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--t2);">×</button>
      </div>
      <div style="font-size:11px;color:var(--t3);letter-spacing:.05em;margin-bottom:6px;">내보낼 범위</div>
      <div style="display:flex;gap:6px;margin-bottom:16px;">
        <button data-scope="filtered" style="flex:1;padding:7px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font-body);
          background:${scope==='filtered'?'var(--gold)':'var(--bg3)'};color:${scope==='filtered'?'#fff':'var(--t2)'};
          border:0.5px solid ${scope==='filtered'?'var(--gold)':'var(--bg5)'};">
          현재 필터 (${filtered.length}개)</button>
        <button data-scope="all" style="flex:1;padding:7px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font-body);
          background:${scope==='all'?'var(--gold)':'var(--bg3)'};color:${scope==='all'?'#fff':'var(--t2)'};
          border:0.5px solid ${scope==='all'?'var(--gold)':'var(--bg5)'};">
          전체 (${allData.length}개)</button>
      </div>
      <div style="font-size:11px;color:var(--t3);letter-spacing:.05em;margin-bottom:6px;">빈칸 있는 항목만 필터</div>
      <div style="font-size:11px;color:var(--t4);margin-bottom:8px;">체크한 필드가 비어있는 행만 포함됩니다</div>
      ${EMPTY_OPTS.map(f => `
        <label style="display:flex;align-items:center;gap:8px;padding:7px 0;
          border-bottom:0.5px solid var(--bg4);cursor:pointer;font-size:13px;color:var(--t2);">
          <input type="checkbox" data-empty="${f.key}" ${emptyFilter.has(f.key)?'checked':''}
            style="accent-color:var(--gold);width:14px;height:14px;flex-shrink:0;"/>
          ${f.label} 없음
        </label>`).join('')}
      <div style="margin-top:16px;padding:10px;background:var(--bg2);border-radius:var(--r-sm);
        border:0.5px solid var(--bg5);font-size:11px;color:var(--t3);line-height:1.7;">
        📌 <strong style="color:var(--t2);">upload.html과 동일한 포맷</strong>으로 내보냅니다<br>
        name / address / shortAddr / phone / hours / memo / tag1~4 / broadcast_program / broadcast_date
      </div>
      <button id="do-export" style="width:100%;padding:12px;margin-top:14px;background:var(--gold);color:#fff;
        border:none;border-radius:var(--r-md);font-size:14px;font-weight:500;
        font-family:var(--font-body);cursor:pointer;">📥 다운로드</button>`

    sheet.querySelector('#close-export').onclick = () => sheet.remove()
    sheet.querySelectorAll('[data-scope]').forEach(btn => {
      btn.onclick = () => { scope = btn.dataset.scope; renderSheet() }
    })
    sheet.querySelectorAll('[data-empty]').forEach(cb => {
      cb.onchange = () => { cb.checked ? emptyFilter.add(cb.dataset.empty) : emptyFilter.delete(cb.dataset.empty) }
    })
    sheet.querySelector('#do-export').onclick = () => {
      let rows = scope === 'all' ? allData : filtered
      if (emptyFilter.size > 0) {
        rows = rows.filter(r =>
          EMPTY_OPTS.filter(f => emptyFilter.has(f.key)).some(f => {
            const v = f.get(r); return !v || v === ''
          })
        )
      }
      if (!rows.length) { alert('내보낼 데이터가 없습니다'); return }
      const suffix = emptyFilter.size > 0 ? '_빈칸포함' : ''
      const csv = '\uFEFF' + [EXPORT_HEADER, ...rows.map(buildExportRow)].join('\n')
      const a = document.createElement('a')
      a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}))
      a.download = `MGA_데이터${suffix}_${new Date().toISOString().slice(0,10)}.csv`
      a.click()
      sheet.remove()
    }
  }

  renderSheet()
  document.body.appendChild(sheet)
})
</script>
