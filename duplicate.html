<!DOCTYPE html>
<html lang="ko" class="page-scroll">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#141414" />
  <title>MGA — 중복 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <style>
    body { background:var(--bg0); color:var(--t1); min-height:100vh; padding:40px 20px; font-family:var(--font-body); }
    .container { max-width:760px; margin:0 auto; }

    .page-logo { font-family:var(--font-display); font-size:24px; margin-bottom:6px; }
    .page-logo span { color:var(--gold); }
    .page-title { font-size:18px; font-weight:500; margin-bottom:4px; }
    .page-sub { font-size:13px; color:var(--t3); margin-bottom:28px; }

    .card { background:var(--bg2); border:0.5px solid var(--bg5); border-radius:var(--r-md); padding:20px; margin-bottom:16px; }
    .card-title { font-size:13px; font-weight:500; color:var(--t2); margin-bottom:14px; letter-spacing:0.04em; }

    /* 로그인 */
    #login-area { text-align:center; padding:60px 20px; }
    .btn-google { display:inline-flex; align-items:center; gap:10px; padding:13px 28px; background:var(--gold); color:#1a1100; border:none; border-radius:var(--r-md); font-size:15px; font-weight:500; font-family:var(--font-body); cursor:pointer; }

    /* 상태 바 */
    .status-bar { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:var(--bg2); border:0.5px solid var(--bg5); border-radius:var(--r-md); margin-bottom:16px; }
    .badge { display:inline-block; padding:3px 10px; border-radius:8px; font-size:11px; font-weight:500; }
    .badge-gold { background:rgba(201,169,110,.15); color:var(--gold); border:0.5px solid rgba(201,169,110,.3); }
    .badge-red  { background:rgba(107,61,61,.3); color:#f5c4b3; border:0.5px solid #6b3d3d; }
    .badge-green{ background:rgba(61,107,92,.3); color:#9fe1cb; border:0.5px solid #3d6b5c; }

    /* 중복 그룹 */
    .dup-group {
      background:var(--bg2); border:0.5px solid var(--bg5);
      border-radius:var(--r-md); margin-bottom:10px;
      overflow:hidden;
    }
    .dup-group-header {
      display:flex; align-items:center; gap:10px;
      padding:12px 16px;
      background:var(--bg3);
      border-bottom:0.5px solid var(--bg5);
      cursor:pointer;
    }
    .dup-name { font-size:14px; font-weight:500; flex:1; }
    .dup-count { font-size:11px; color:var(--gold); }

    .dup-item {
      display:flex; align-items:center; gap:12px;
      padding:10px 16px;
      border-bottom:0.5px solid var(--bg4);
    }
    .dup-item:last-child { border-bottom:none; }
    .dup-item input[type=checkbox] {
      width:16px; height:16px; cursor:pointer;
      accent-color:var(--gold);
    }
    .dup-info { flex:1; }
    .dup-addr { font-size:12px; color:var(--t3); margin-bottom:4px; }
    .dup-tags { display:flex; gap:4px; flex-wrap:wrap; }
    .dup-date { font-size:11px; color:var(--t4); }

    .chip { display:inline-block; padding:2px 8px; border-radius:12px; font-size:10px; font-weight:500; border:0.5px solid; }
    .chip-food     { background:var(--food-bg);     color:var(--food-fg);     border-color:var(--food-bd); }
    .chip-source   { background:var(--source-bg);   color:var(--source-fg);   border-color:var(--source-bd); }
    .chip-status   { background:var(--status-bg);   color:var(--status-fg);   border-color:var(--status-bd); }
    .chip-purpose  { background:var(--purpose-bg);  color:var(--purpose-fg);  border-color:var(--purpose-bd); }
    .chip-facility { background:var(--facility-bg); color:var(--facility-fg); border-color:var(--facility-bd); }
    .chip-space    { background:var(--space-bg);     color:var(--space-fg);    border-color:var(--space-bd); }

    /* 버튼 */
    .btn-gold { padding:12px 28px; background:var(--gold); color:#1a1100; border:none; border-radius:var(--r-md); font-size:14px; font-weight:500; font-family:var(--font-body); cursor:pointer; transition:opacity 150ms; }
    .btn-gold:disabled { opacity:.5; cursor:not-allowed; }
    .btn-ghost { padding:12px 20px; background:var(--bg3); color:var(--t2); border:0.5px solid var(--bg5); border-radius:var(--r-md); font-size:14px; font-weight:500; font-family:var(--font-body); cursor:pointer; margin-left:8px; }
    .btn-red { padding:12px 28px; background:rgba(107,61,61,.3); color:#f5c4b3; border:0.5px solid #6b3d3d; border-radius:var(--r-md); font-size:14px; font-weight:500; font-family:var(--font-body); cursor:pointer; }
    .btn-red:disabled { opacity:.5; cursor:not-allowed; }

    .flex-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

    /* 스피너 */
    .spinner { width:24px; height:24px; border:2px solid var(--bg5); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; margin:40px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* 빈 상태 */
    .empty { text-align:center; padding:60px 20px; color:var(--t3); }
    .empty .emoji { font-size:40px; margin-bottom:12px; }

    /* 상단 액션 바 */
    .action-bar {
      position:sticky; top:0; z-index:10;
      background:var(--bg1);
      padding:12px 0;
      margin-bottom:8px;
      border-bottom:0.5px solid var(--bg5);
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }

    a.back-link { color:var(--t3); font-size:13px; text-decoration:none; }
    a.back-link:hover { color:var(--gold); }

    .select-all-row {
      display:flex; align-items:center; gap:8px;
      padding:8px 16px;
      background:var(--bg3);
      border-radius:var(--r-sm);
      font-size:12px; color:var(--t2);
      margin-bottom:12px;
      cursor:pointer;
    }
    .select-all-row input { accent-color:var(--gold); width:15px; height:15px; cursor:pointer; }
  </style>
</head>
<body>
<div class="container">

  <!-- 헤더 -->
  <div style="margin-bottom:24px;">
    <div class="page-logo">My Gourmet<span>.</span></div>
    <div class="page-title">🔍 중복 관리</div>
    <div class="page-sub">같은 상호명의 중복 데이터를 감지하고 선택해서 삭제합니다</div>
  </div>

  <!-- 로그인 전 -->
  <div id="login-area">
    <div style="font-size:13px;color:var(--t3);margin-bottom:20px;">로그인이 필요합니다</div>
    <button class="btn-google" id="btn-login">Google로 로그인</button>
  </div>

  <!-- 로그인 후 -->
  <div id="main-area" style="display:none;">

    <!-- 상태 바 -->
    <div class="status-bar">
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="user-name" style="font-size:13px;font-weight:500;"></span>
        <span class="badge badge-gold" id="total-badge">전체 0개</span>
        <span class="badge badge-red"  id="dup-badge">중복 0그룹</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn-ghost" style="padding:6px 12px;font-size:12px;" id="btn-refresh">🔄 새로고침</button>
        <a href="index.html" class="back-link">← 앱으로</a>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="loading-area">
      <div class="spinner"></div>
      <div style="text-align:center;color:var(--t3);font-size:13px;">중복 데이터 분석 중…</div>
    </div>

    <!-- 중복 없음 -->
    <div id="no-dup-area" style="display:none;">
      <div class="empty">
        <div class="emoji">✅</div>
        <div style="font-size:15px;font-weight:500;margin-bottom:8px;">중복 데이터가 없습니다!</div>
        <div style="font-size:13px;">모든 맛집 데이터가 깔끔하게 정리되어 있습니다</div>
      </div>
    </div>

    <!-- 중복 목록 -->
    <div id="dup-area" style="display:none;">

      <!-- 액션 바 -->
      <div class="action-bar">
        <div class="select-all-row" id="select-all-row">
          <input type="checkbox" id="chk-all" />
          <label for="chk-all" style="cursor:pointer;">전체 선택 (최신 제외 나머지 선택)</label>
          <span id="selected-count" style="margin-left:auto;color:var(--gold);font-weight:500;"></span>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="btn-red" id="btn-delete" disabled>선택 항목 삭제</button>
        <button class="btn-ghost" id="btn-deselect">선택 해제</button>
        <span style="font-size:12px;color:var(--t3);align-self:center;" id="delete-hint"></span>
      </div>

      <div id="dup-list"></div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp }           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
import { getFirestore,
         collection, getDocs, deleteDoc,
         query, where, doc }       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
import { getAuth, GoogleAuthProvider,
         onAuthStateChanged,
         signInWithPopup }         from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'

// ★ Firebase 설정값 입력 ★
const firebaseConfig = {
  apiKey:            "여기에_API_KEY",
  authDomain:        "여기에_AUTH_DOMAIN",
  projectId:         "여기에_PROJECT_ID",
  storageBucket:     "여기에_STORAGE_BUCKET",
  messagingSenderId: "여기에_SENDER_ID",
  appId:             "여기에_APP_ID"
}

const app  = initializeApp(firebaseConfig)
const db   = getFirestore(app)
const auth = getAuth(app)

let currentUser = null
let allDocs     = []
let dupGroups   = []
let selectedIds = new Set()

// ── DOM ──
const loginArea   = document.getElementById('login-area')
const mainArea    = document.getElementById('main-area')
const loadingArea = document.getElementById('loading-area')
const noDupArea   = document.getElementById('no-dup-area')
const dupArea     = document.getElementById('dup-area')
const dupList     = document.getElementById('dup-list')
const btnDelete   = document.getElementById('btn-delete')
const btnDeselect = document.getElementById('btn-deselect')
const chkAll      = document.getElementById('chk-all')

// ── 인증 ──
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user
    loginArea.style.display = 'none'
    mainArea.style.display  = 'block'
    document.getElementById('user-name').textContent = user.displayName ?? ''
    await loadAndAnalyze()
  } else {
    loginArea.style.display = 'block'
    mainArea.style.display  = 'none'
  }
})

document.getElementById('btn-login').onclick =
  () => signInWithPopup(auth, new GoogleAuthProvider())

document.getElementById('btn-refresh').onclick = loadAndAnalyze

// ── 데이터 로드 & 중복 분석 ──
async function loadAndAnalyze() {
  loadingArea.style.display = 'block'
  noDupArea.style.display   = 'none'
  dupArea.style.display     = 'none'
  selectedIds.clear()

  const snap = await getDocs(
    query(collection(db, 'restaurants'), where('userId','==', currentUser.uid))
  )
  allDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }))

  document.getElementById('total-badge').textContent = `전체 ${allDocs.length}개`

  // 상호명 기준 그룹핑
  const groups = {}
  allDocs.forEach(r => {
    const key = (r.name ?? '').replace(/[\s\(\)\.\-]/g,'').toLowerCase()
    if (!groups[key]) groups[key] = []
    groups[key].push(r)
  })

  // 2개 이상인 것만 중복
  dupGroups = Object.values(groups).filter(g => g.length >= 2)
  // 최신순 정렬
  dupGroups.forEach(g => {
    g.sort((a,b) => {
      const ta = a.createdAt?.seconds ?? 0
      const tb = b.createdAt?.seconds ?? 0
      return tb - ta
    })
  })

  document.getElementById('dup-badge').textContent = `중복 ${dupGroups.length}그룹`
  loadingArea.style.display = 'none'

  if (!dupGroups.length) {
    noDupArea.style.display = 'block'
    return
  }

  dupArea.style.display = 'block'
  renderDupList()
}

// ── 중복 목록 렌더 ──
function renderDupList() {
  dupList.innerHTML = dupGroups.map((group, gi) => {
    const name = group[0].name ?? '(이름없음)'
    return `
      <div class="dup-group">
        <div class="dup-group-header" onclick="toggleGroup(${gi})">
          <span class="dup-name">${name}</span>
          <span class="dup-count">${group.length}개 중복</span>
          <span style="color:var(--t3);font-size:12px;" id="arrow-${gi}">▼</span>
        </div>
        <div id="group-body-${gi}">
          ${group.map((r, ri) => {
            const tags = (r.tagIds ?? []).slice(0,3).map(id => {
              const cat   = id.split('__')[0]
              const label = id.split('__')[1] ?? id
              const cls   = {food:'chip-food',source:'chip-source',
                             status:'chip-status',purpose:'chip-purpose',
                             facility:'chip-facility',space:'chip-space'}[cat] ?? ''
              return `<span class="chip ${cls}">${label}</span>`
            }).join('')

            const date = r.createdAt?.seconds
              ? new Date(r.createdAt.seconds * 1000).toLocaleDateString('ko-KR')
              : '날짜 없음'

            const isLatest = ri === 0
            const checked  = selectedIds.has(r.id) ? 'checked' : ''

            return `
              <div class="dup-item" id="item-${r.id}">
                <input type="checkbox" id="chk-${r.id}"
                  data-id="${r.id}"
                  ${isLatest ? 'disabled title="최신 항목 (보존)"' : checked}
                  onchange="toggleSelect('${r.id}', this.checked)"
                />
                <div class="dup-info">
                  <div class="dup-addr">
                    ${r.shortAddr || r.address || '주소 없음'}
                    ${isLatest
                      ? '<span class="badge badge-green" style="margin-left:6px;">최신 보존</span>'
                      : ''}
                  </div>
                  <div class="dup-tags" style="margin-bottom:4px;">${tags || '태그 없음'}</div>
                  <div class="dup-date">등록일: ${date}</div>
                </div>
              </div>`
          }).join('')}
        </div>
      </div>`
  }).join('')

  updateUI()
}

// ── 그룹 펼치기/접기 ──
window.toggleGroup = (gi) => {
  const body  = document.getElementById(`group-body-${gi}`)
  const arrow = document.getElementById(`arrow-${gi}`)
  const open  = body.style.display !== 'none'
  body.style.display  = open ? 'none' : 'block'
  arrow.textContent   = open ? '▶' : '▼'
}

// ── 체크박스 ──
window.toggleSelect = (id, checked) => {
  checked ? selectedIds.add(id) : selectedIds.delete(id)
  updateUI()
}

// 전체 선택 (최신 제외 나머지)
chkAll.onchange = () => {
  const checked = chkAll.checked
  dupGroups.forEach(g => {
    g.slice(1).forEach(r => {  // 첫번째(최신) 제외
      const chk = document.getElementById(`chk-${r.id}`)
      if (chk && !chk.disabled) {
        chk.checked = checked
        checked ? selectedIds.add(r.id) : selectedIds.delete(r.id)
      }
    })
  })
  updateUI()
}

document.getElementById('btn-deselect').onclick = () => {
  selectedIds.clear()
  document.querySelectorAll('input[type=checkbox][data-id]').forEach(c => {
    if (!c.disabled) c.checked = false
  })
  chkAll.checked = false
  updateUI()
}

function updateUI() {
  const cnt = selectedIds.size
  document.getElementById('selected-count').textContent =
    cnt ? `${cnt}개 선택됨` : ''
  document.getElementById('delete-hint').textContent =
    cnt ? `선택한 ${cnt}개를 삭제합니다` : ''
  btnDelete.disabled = cnt === 0
}

// ── 삭제 ──
btnDelete.onclick = async () => {
  const cnt = selectedIds.size
  if (!confirm(`선택한 ${cnt}개를 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return

  btnDelete.disabled = true
  btnDelete.textContent = '삭제 중…'

  let done = 0
  for (const id of selectedIds) {
    try {
      await deleteDoc(doc(db, 'restaurants', id))
      const el = document.getElementById(`item-${id}`)
      if (el) el.style.opacity = '0.3'
      done++
    } catch(e) {
      console.error(e)
    }
  }

  alert(`${done}개 삭제 완료!`)
  await loadAndAnalyze()
  btnDelete.textContent = '선택 항목 삭제'
}
</script>
</body>
</html>
